name: Daily Japan Digest

on:
  schedule:
    # 10:00 UTC = 6:00 AM ET (DST, Mar–Nov) / 5:00 AM ET (standard, Nov–Mar)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Collection only — no API key needed. Scrapes all feeds + market data, uploads collected.json. Skips digest/render/send.'
        type: boolean
        default: false
      live_send:
        description: 'Actually send the email. Leave false for a safe test run (collect + digest + render only; HTML uploaded as an artifact, no email, no archive commit).'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: japan-digest
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          WEB_URL: ${{ vars.WEB_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "::notice::DRY RUN — collection only (no API key required). Skips digest/render/send."
            python run.py --dry-run
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.live_send }}" != "true" ]; then
            echo "::notice::TEST RUN — collect + digest + render only (no email, no archive)."
            python run.py --no-send --no-archive
          else
            python run.py
          fi

      - name: Upload rendered digest (artifact)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-output
          path: |
            collected.json
            digest.html
            digest.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit tracker state + archive
        if: ${{ github.event_name == 'schedule' || inputs.live_send == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pm_tracker.json region_tracker.json public/ README.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily Japan Digest run $(date -u +%Y-%m-%d)"
          git push || echo "Nothing to push"
